# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# --- S26 Ultra Integration (2026 Unified Syntax) ---
# Forces scrcpy to the left monitor, workspace 10, fullscreen, no animations, and silent spawn
windowrule = monitor DP-1, workspace 10 silent, fullscreen 1, no_anim 1, border_size 0, no_shadow 1, match:title ^(S26_KVM)$

# Bind the workspace to the physical monitor permanently
